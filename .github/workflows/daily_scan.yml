name: Daily Portfolio Scan

on:
  schedule:
    # Runs every weekday at 17:00 Israel summer time (14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory and mock state file
        run: |
          mkdir -p data
          echo '{"positions": {}, "cash": 100000.0, "portfolio_value": 100000.0, "last_rebalance": "2026-06-07"}' > data/paper_trading_state.json

      - name: Run daily scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_scan.py